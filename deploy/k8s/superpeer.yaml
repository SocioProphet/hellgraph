# HellGraph super-peer — GKE manifests (Namespace, Secret, PVC, Deployment, Service).
# Apply with kustomize/kubectl or via the ArgoCD Application (deploy/argocd-application.yaml).
# Replace REGISTRY/TAG and the auth secret before applying.
---
apiVersion: v1
kind: Namespace
metadata:
  name: hellgraph
---
# Bearer-token HMAC secret. Create the REAL one out-of-band (do NOT commit a real value):
#   kubectl -n hellgraph create secret generic hellgraph-superpeer-auth \
#     --from-literal=HELLGRAPH_AUTH_SECRET="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: hellgraph-superpeer-auth
  namespace: hellgraph
type: Opaque
stringData:
  HELLGRAPH_AUTH_SECRET: "REPLACE_ME_WITH_A_32_BYTE_HEX_SECRET"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hellgraph-superpeer-data
  namespace: hellgraph
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hellgraph-superpeer
  namespace: hellgraph
  labels: { app: hellgraph-superpeer }
spec:
  replicas: 1 # a super-peer is a single-writer index; scale reads later, not this
  strategy: { type: Recreate } # single RWO PVC — don't run two pods on it
  selector:
    matchLabels: { app: hellgraph-superpeer }
  template:
    metadata:
      labels: { app: hellgraph-superpeer }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: superpeer
          image: REGISTRY/hellgraph-superpeer:TAG
          ports:
            - { name: http, containerPort: 8850 }
          env:
            - { name: HELLGRAPH_HTTP_PORT, value: "8850" }
            - { name: HELLGRAPH_STORAGE_DIR, value: /var/lib/hellgraph-superpeer }
            # Omit BOOTSTRAP_KEY → this node is the federation creator. Set it to join an edge.
            # - { name: HELLGRAPH_BOOTSTRAP_KEY, value: "<edge base key hex>" }
            # Hyperswarm DHT needs UDP egress + hole-punching. Set "0" to run HTTP-only
            # (replication wired via a sidecar/direct transport) if the cluster blocks it.
            - { name: HELLGRAPH_JOIN_SWARM, value: "1" }
          envFrom:
            - secretRef: { name: hellgraph-superpeer-auth }
          volumeMounts:
            - { name: data, mountPath: /var/lib/hellgraph-superpeer }
          livenessProbe:
            httpGet: { path: /livez, port: http } # public, unauthenticated
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: hellgraph-superpeer-data }
---
apiVersion: v1
kind: Service
metadata:
  name: hellgraph-superpeer
  namespace: hellgraph
  labels: { app: hellgraph-superpeer }
spec:
  selector: { app: hellgraph-superpeer }
  ports:
    - { name: http, port: 8850, targetPort: http }
