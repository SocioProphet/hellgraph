name: ts-ci

# TypeScript engine lane (independent of the Rust crate CI). Builds the package
# and fails if the committed ts/dist has drifted from ts/src — since consumers
# install the prebuilt dist via git dependency, the build must always be current.
#
# `build-and-verify-dist` is a REQUIRED status check on `main`. A required check
# that is path-filtered never reports on PRs that don't touch those paths, which
# leaves the required context stuck "expected" and blocks the PR forever (a
# Rust-only PR could only merge via an admin bypass). To avoid that trap the job
# runs on ALL pull requests and reports its context, but the expensive npm build
# only runs when TS/dist-relevant files actually changed — the dist-drift
# guarantee is unchanged, it just no longer blocks unrelated PRs.
on:
  push:
    paths:
      - "package.json"
      - "ts/**"
      - ".github/workflows/ts-ci.yml"
  pull_request: {}

jobs:
  build-and-verify-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect TS/dist-relevant changes
        id: changed
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            # push is already path-filtered to TS-relevant paths — always build.
            echo "ts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -qE '^(package\.json|ts/)'; then
            echo "ts=true" >> "$GITHUB_OUTPUT"
          else
            echo "ts=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changed.outputs.ts == 'true'
        with:
          node-version: 20

      - name: Install
        if: steps.changed.outputs.ts == 'true'
        run: npm install --no-audit --no-fund

      - name: Typecheck
        if: steps.changed.outputs.ts == 'true'
        run: npm run typecheck

      - name: Rebuild dist
        if: steps.changed.outputs.ts == 'true'
        run: npm run build

      - name: Fail if committed ts/dist is stale
        if: steps.changed.outputs.ts == 'true'
        run: |
          if ! git diff --quiet -- ts/dist; then
            echo "::error::ts/dist is out of date with ts/src. Run 'npm run build' and commit ts/dist."
            git diff --stat -- ts/dist
            exit 1
          fi
          echo "ts/dist is in sync with source."

      - name: No TS/dist changes — required check trivially satisfied
        if: steps.changed.outputs.ts != 'true'
        run: echo "This PR touches no package.json or ts/** files; build-and-verify-dist has nothing to verify."
