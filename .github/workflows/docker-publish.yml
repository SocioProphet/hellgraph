name: docker-publish

# Build + push the super-peer container image to Google Artifact Registry on a version tag.
# Requires repo/org secrets: GAR_LOCATION (e.g. us-docker.pkg.dev), GAR_REPOSITORY
# (project/repo path), and Workload-Identity-Federation via GCP_WORKLOAD_IDENTITY_PROVIDER +
# GCP_SERVICE_ACCOUNT. No long-lived keys.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # for GCP Workload Identity Federation

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker "${{ secrets.GAR_LOCATION }}" --quiet

      - uses: docker/setup-buildx-action@v3

      - id: meta
        run: echo "image=${{ secrets.GAR_LOCATION }}/${{ secrets.GAR_REPOSITORY }}/hellgraph-superpeer" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.ref_name }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
